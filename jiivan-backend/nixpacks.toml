[variables]
PHP_VERSION = "8.2"

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "php artisan storage:link"
]

[phases.build]
cmds = [
    "npm install",
    "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8080"